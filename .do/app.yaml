name: square-webhook-sync
region: nyc
services:
  - name: web
    git:
      repo_clone_url: https://github.com/BennyTheBall/square-webhook-sync.git
      branch: main
    dockerfile_path: Dockerfile
    source_dir: /
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    health_check:
      http_path: /healthz
    envs:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: America/New_York
      - key: PORT
        value: "3000"
      - key: SQUARE_WEBHOOK_NOTIFICATION_URL
        value: https://webhooks.thestrawberryshopyork.com/webhooks/square
      - key: SHOPIFY_STORES
        value: strawberry,nwt
      - key: SHOPIFY_NWT_NAME
        value: New With Tags
      - key: SHOPIFY_NWT_DOMAIN
        value: NewWithTagsUS.myshopify.com
      - key: SHOPIFY_NWT_API_VERSION
        value: "2026-07"
      - key: SHOPIFY_NWT_ACCESS_METHOD
        value: expiring_offline_token
      - key: SHOPIFY_NWT_REDIRECT_URI
        value: https://webhooks.thestrawberryshopyork.com/shopify/oauth/callback
      - key: SHOPIFY_NWT_SCOPES
        value: read_products,write_inventory
      - key: SHOPIFY_NWT_EXPIRING_OFFLINE_TOKENS
        value: "true"
      - key: SHOPIFY_NWT_ENABLED
        value: "false"
      - key: SHOPIFY_NWT_USE_LEGACY_SHOPIFY_ID_COLUMN
        value: "false"
      - key: SHOPIFY_OAUTH_STATE_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SHOPIFY_NWT_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: SHOPIFY_NWT_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SHOPIFY_NWT_LOCATION_ID
        scope: RUN_TIME
        type: SECRET
      - key: SQUARE_WEBHOOK_SIGNATURE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MYSQL_HOST
        scope: RUN_TIME
        type: SECRET
      - key: MYSQL_USER
        scope: RUN_TIME
        type: SECRET
      - key: MYSQL_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: MYSQL_DATABASE
        value: Strawberry
      - key: MYSQL_PORT
        value: "3306"
      - key: SKU_TABLE
        value: SKU_Temp
      - key: SKU_HISTORY_TABLE
        value: SKU_History
      - key: WEBHOOK_TABLE
        value: square_webhook_events
      - key: WORKER_INTERVAL_MS
        value: "60000"
      - key: SHOPIFY_STRAWBERRY_NAME
        value: The Strawberry Shop York
      - key: SHOPIFY_STRAWBERRY_DOMAIN
        scope: RUN_TIME
        type: SECRET
      - key: SHOPIFY_STRAWBERRY_API_VERSION
        value: "2026-07"
      - key: SHOPIFY_STRAWBERRY_ACCESS_METHOD
        value: admin_token
      - key: SHOPIFY_STRAWBERRY_ADMIN_ACCESS_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: SHOPIFY_STRAWBERRY_LOCATION_ID
        scope: RUN_TIME
        type: SECRET
      - key: SHOPIFY_STRAWBERRY_ENABLED
        value: "true"
      - key: SHOPIFY_STRAWBERRY_USE_LEGACY_SHOPIFY_ID_COLUMN
        value: "true"
domains:
  - domain: webhooks.thestrawberryshopyork.com
    type: PRIMARY
    minimum_tls_version: "1.2"
workers:
  - name: retry-worker
    git:
      repo_clone_url: https://github.com/BennyTheBall/square-webhook-sync.git
      branch: main
    dockerfile_path: Dockerfile
    source_dir: /
    instance_count: 1
    instance_size_slug: basic-xxs
    run_command: npm run worker
    envs:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: America/New_York
